{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container mt-3 mb-3">
    <h1><i class="bi bi-search"></i> {{title}}</h1>
    <hr>
    <div class="input-group mb-4">
      <input type="text" id="searchInput" class="form-control" placeholder="Search by game title..." autofocus>
    </div>

    <div id="searchInfo" class="mb-2" style="display:none;">
      <h5 id="searchInfoText"></h5>
      <hr>
    </div>

    <div id="searchResults" class="row g-3"></div>
    <p id="noResults" class="text-muted" style="display:none;">No games found.</p>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('searchResults');
    const noResults = document.getElementById('noResults');
    const searchInfo = document.getElementById('searchInfo');
    const searchInfoText = document.getElementById('searchInfoText');
    let debounceTimer;

    searchInput.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      const q = this.value.trim();
      if (!q) {
        resultsDiv.innerHTML = '';
        noResults.style.display = 'none';
        searchInfo.style.display = 'none';
        return;
      }
      debounceTimer = setTimeout(() => {
        fetch(`{{ url_for('games.api_search') }}?q=${encodeURIComponent(q)}`)
          .then(r => r.json())
          .then(games => {
            searchInfoText.textContent = `Results for "${q}" (${games.length} found)`;
            searchInfo.style.display = 'block';
            if (games.length === 0) {
              resultsDiv.innerHTML = '';
              noResults.style.display = 'block';
              return;
            }
            noResults.style.display = 'none';
            resultsDiv.innerHTML = games.map(g => {
              const statusColor = g.status_raw === 'playing' ? 'success' : g.status_raw === 'completed' ? 'primary' : g.status_raw === 'want_to_play' ? 'warning' : 'danger';
              const img = g.image_url
                ? `<img src="${g.image_url}" alt="${g.title}" class="card-img-top" style="height:200px;object-fit:cover;">`
                : `<div class="card-img-top bg-secondary d-flex align-items-center justify-content-center" style="height:200px;"><i class="bi bi-controller text-white" style="font-size:3rem;"></i></div>`;
              const platforms = g.platform ? g.platform.split(', ').map(p => `<span class="badge bg-secondary">${p}</span>`).join(' ') : '';
              const genres = g.genre ? g.genre.split(', ').map(gn => `<span class="badge bg-info">${gn}</span>`).join(' ') : '';
              const status = g.status ? `<span class="badge bg-${statusColor}">${g.status}</span>` : '';
              const rating = g.rating ? `<div class="mt-2"><strong>Rating:</strong> ${g.rating}/10</div>` : '';
              return `
                <div class="col-lg-4 col-md-6">
                  <div class="card card-game h-100">
                    ${img}
                    <div class="card-body">
                      <h5 class="card-title">${g.title}</h5>
                      ${platforms} ${genres} ${status}
                      ${rating}
                    </div>
                    <div class="card-footer">
                      <a href="/games/edit/${g.id}" class="btn btn-outline-primary btn-sm"><i class="bi bi-pencil"></i> Edit</a>
                      <a href="/games/delete/${g.id}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Are you sure?');"><i class="bi bi-trash"></i> Delete</a>
                    </div>
                  </div>
                </div>`;
            }).join('');
          });
      }, 300);
    });
  </script>
{% endblock %}
