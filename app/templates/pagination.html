{% if pagination.pages > 1 %}
  <nav aria-label="Page navigation" class="mt-4">
    <ul class="pagination justify-content-center">
      <li class="page-item {{ 'disabled' if not pagination.has_prev }}">
        <a class="page-link" href="{{ url_for(request.endpoint, page=pagination.prev_num, **request.view_args) }}">
          <i class="bi bi-chevron-left"></i> Prev
        </a>
      </li>
      {% for p in pagination.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
        {% if p %}
          <li class="page-item {{ 'active' if p == pagination.page }}">
            <a class="page-link" href="{{ url_for(request.endpoint, page=p, **request.view_args) }}">{{ p }}</a>
          </li>
        {% else %}
          <li class="page-item disabled">
            <span class="page-link">&hellip;</span>
          </li>
        {% endif %}
      {% endfor %}
      <li class="page-item {{ 'disabled' if not pagination.has_next }}">
        <a class="page-link" href="{{ url_for(request.endpoint, page=pagination.next_num, **request.view_args) }}">
          Next <i class="bi bi-chevron-right"></i>
        </a>
      </li>
    </ul>
  </nav>
{% endif %}
